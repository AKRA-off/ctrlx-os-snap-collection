name: ai-detector
title: AI Detector
version: 1.0.0
summary: AI Detector
description: |
 yolov8-seg based processing, choose to use .onnx of .hef models
base: core22
confinement: strict
grade: stable

#architectures:
 # - build-on: arm64
 # - build-on: amd64

apps:
  client:
    command: bin/main.py
    plugs:
      - network
      - network-bind
      - network-control
      - network-status
      - network-setup-control
      - network-observe
      - hardware-observe
      - datalayer
      - system-observe
      - system-files
      - shared-memory
      - active-solution
      - camera
      - serial-port
      - raw-usb
      - hailo-0
      - hailo-1
    daemon: simple
    restart-condition: always
    passthrough:
      restart-delay: 30s
    environment:
        "LD_LIBRARY_PATH": "$LD_LIBRARY_PATH:$SNAP/usr/include:$LD_LIBRARY_PATH:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/lapack:$SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/blas:$SNAP/usr/lib/python3.10/dist-packages:$SNAP/opt/MVS/bin:$SNAP/opt/MVS/lib/aarch64:$SNAP/opt/MVS/lib/aarch64:$SNAP/opt/MVS/lib/aarch64"
        MVCAM_SDK_PATH: $SNAP/opt/MVS
        MVCAM_COMMON_RUNENV: $SNAP/opt/MVS/lib/
        MVCAM_MVS_LIBENV: $SNAP/opt/MVS/lib/
        MVCAM_GENICAM_CLPROTOCOL: $SNAP/opt/MVS/lib/CLProtocol
        TESSDATA_PREFIX: $SNAP/usr/share/tesseract-ocr/5/tessdata/
        GENICAM_CACHE_V3_1: $TMP
        PATH": $PATH:$SNAP/usr/lib/ 
  
  activeconfiguration:
    command: ./bin/set_env_path.sh
    daemon: simple
    plugs: [network, network-bind, active-solution]


parts:
  client:
    plugin: python
    source: .
    build-environment:
      - PYTHONPATH: "$SNAPCRAFT_PART_INSTALL/usr/lib/python3/dist-packages"
    override-build: |
      snapcraftctl build
      ln -sf ../usr/lib/libsnapcraft-preload.so $SNAPCRAFT_PART_INSTALL/lib/libsnapcraft-preload.so
    stage-packages:
      - gcc-x86-64-linux-gnu
      - gfortran
      - libzmq5
      #- ctrlx-datalayer
      - libsystemd-dev
      - python3-opencv
      - libblas-dev
      - liblapack-dev
      - python3-dev
      - python3-wheel
      - libatlas-base-dev
      - openssl
      - v4l-utils
      - libv4l-dev
      - libv4l-0
      - libv4l2rds0

    python-packages:
      - flask
      #- numpy==1.26.3
      - numpy==1.23.3
      - pyModbusTCP
      - wheel
      - opencv-python
      - ctrlx-datalayer
      - ctrlx-fbs
      - config
      - pyzmq
      - ipykernel
      #- ultralytics
      - gitpython
      - onnxruntime
      - waitress
      - PyYAML
      #- pypylon
      - gevent
      - argcomplete #for hailo
      - contextlib2 #for hailo
      - future #for hailo
      - netaddr #for hailo
      - netifaces #for hailo
      - verboselogs #for hailo
      - scipy #IS req
      - lap #IS req
      - cython_bbox #IS req
      - loguru #IS req
      - Cython #IS req
    build-packages:
      - python3-dev
      - python3-wheel
      - build-essential
      - python3-setuptools
      - libzbar0
      - libzbar-dev
      - libatlas-base-dev
  hlib:
    plugin: nil
    source: ./customPackages
    build-packages:
      - python3-dev
      - python3-wheel
      - build-essential
      - python3-setuptools
    after:
      - client
    override-build: |
        echo $SNAPCRAFT_ARCH_TRIPLET
        case "$SNAPCRAFT_ARCH_TRIPLET" in
          *aarch64*)
              WHEEL_FILE="hailort-4.19.0-cp310-cp310-linux_aarch64.whl" ;;
          *x86_64*)
              WHEEL_FILE="hailort-4.19.0-cp310-cp310-linux_x86_64.whl" ;;
          *)
              echo "Unsupported architecture!"
              exit 1 ;;
        esac
        ls
        echo "The dependencies are installed in the flask part to avoid conflicts"
        python3 -m pip install --no-deps --no-cache-dir -I $WHEEL_FILE -t $CRAFT_PART_INSTALL/lib/python3.10/site-packages/
        craftctl default

  hdeb:
      plugin: dump
      source: 
        - on arm64: ./customPackages/hailort_4.19.0_arm64.deb
        - on amd64: ./customPackages/hailort_4.19.0_amd64.deb
      source-type: deb

  configs:     ##IMPORTANT PART for the package manifest file  <-------------------------------------------
    source: ./configs
    plugin: dump   ##With this plugin the content of the source is brought to the defined folder. In this case, what is inside the ./configs folder is copied to a package-assets/ folder
    organize:
      'package-assets/*': package-assets/${SNAPCRAFT_PROJECT_NAME}/

  activeconfiguration:
    source: ./configs/
    plugin: dump
    organize:
      '*': bin/
  
  flask-dependencies:
    source: .
    plugin: dump
    organize:
      'dependencies/*': bin/   #Copies the content inside dependencies (for that /* is required) into the bin folder

  datalayerdeb:
    plugin: dump
    source: https://github.com/boschrexroth/ctrlx-automation-sdk/releases/download/3.4.0/ctrlx-datalayer-2.8.6.deb
    source-type: deb

  pylondeb:
    plugin: dump
    source: https://github.com/AKRA-off/hik_arm/raw/main/opt.zip
    source-type: zip
    organize:
      '*': opt/
  
hooks:  # This part is for the hooks section located in snap/hooks. These files contain some scripts that are executed in certain times
    connect-plug-active-solution:  #Plug added to the hook so that the active configuration can be manipulated (Same name as the executable file)
        plugs: [active-solution]

plugs:
  datalayer:
    interface: content
    content: datalayer
    target: $SNAP_DATA/.datalayer
  
  system-files:
    interface: system-files
    write: [/dev/shm, /proc/sys/net/core, /usr/bin, /usr/bin/mount, /proc]

  shared-memory:
    interface: shared-memory
    private: true

  active-solution:  
    interface: content
    content: solutions
    target: $SNAP_COMMON/solutions

  hailo-0:
    interface: custom-device
    custom-device: ctrlx-hailo-0
  
  hailo-1:
    interface: custom-device
    custom-device: ctrlx-hailo-1

slots:
    # This slot is for sidebar integration
    package-assets:         #This slot lets certain files be available outside the snap
        interface: content
        content: package-assets
        source:
            read:
            - $SNAP/package-assets/${SNAPCRAFT_PROJECT_NAME}
    package-run:
        interface: content
        content: package-run
        source:
            write:
            - $SNAP_DATA/package-run/${SNAPCRAFT_PROJECT_NAME}


