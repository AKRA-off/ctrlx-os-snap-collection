# Run the pipeline only on MRs, tags, and default branch
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

variables:
  BUILD_DIR: "build"
  # Use single CMake version
  CMAKE_URL: "https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAME}/${CI_COMMIT_TAG}"

stages:
  - build-debug
  - test-debug
  - build-release
  - test-release
  - upload

# Reusable CMake installation script
.cmake_install: &cmake_install
  - apt-get update
  - apt-get install -y wget lcov
  - wget ${CMAKE_URL} -O /tmp/cmake.tar.gz
  - tar -xvzf /tmp/cmake.tar.gz -C /usr/local --strip-components=1
  - cmake --version

# Development build with tests and coverage
build-debug:
  stage: build-debug
  image: gcc:8.5.0
  before_script:
    - *cmake_install
  script:
    - mkdir -p ${BUILD_DIR}
    - cd ${BUILD_DIR}
    - cmake .. -DCMAKE_BUILD_TYPE=Debug -DKORD_PROTOCOL_WITH_TESTS=ON -DKORD_PROTOCOL_WITH_COVERAGE=ON -DGCOV_EXECUTABLE=/usr/bin/gcov-8
    - make package
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 week

# Debug tests and coverage
test-debug:
  stage: test-debug
  dependencies:
    - build-debug
  image: gcc:8.5.0
  before_script:
    - *cmake_install
    - apt-get install -y libdatetime-perl
    - apt-get install -y python3 python3-pip
    - pip3 install --upgrade pip setuptools
    - pip3 install gcovr
  script:
    - cd ${BUILD_DIR}
    - ctest --output-junit test_debug_results.xml --output-on-failure
    - make coverage_cobertura
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ${BUILD_DIR}/coverage_report/coverage.xml
      junit: ${BUILD_DIR}/test_debug_results.xml
    
# Production release build
build-release:
  stage: build-release
  image: gcc:8.5.0
  before_script:
    - *cmake_install
  script:
    - mkdir -p ${BUILD_DIR}
    - cd ${BUILD_DIR}
    - cmake .. -DCMAKE_BUILD_TYPE=Release -DKORD_PROTOCOL_WITH_TESTS=ON -DKORD_PROTOCOL_WITH_COVERAGE=OFF
    - make -j $(nproc)
    - make package
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 week

# Release tests
test-release:
  stage: test-release
  dependencies:
    - build-release
  image: gcc:8.5.0
  before_script:
    - *cmake_install
  script:
    - cd ${BUILD_DIR}
    - ctest --output-junit test_release_results.xml --output-on-failure
  artifacts:
    reports:
      junit: ${BUILD_DIR}/test_release_results.xml

# Upload package to GitLab package registry, only for release tags
upload-package:
  stage: upload
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build-release
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+.*$/
  script:
    - |
      apk add --no-cache curl

      export VERSION=$(cat ${CI_PROJECT_DIR}/version.txt)
      for file in ${BUILD_DIR}/*.deb; do
        if [ -f "$file" ]; then
          filename=$(basename "$file")
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$file" "${PACKAGE_REGISTRY_URL}/${filename}"
          echo "Uploaded $filename to ${PACKAGE_REGISTRY_URL}/${filename}"
        fi
      done
      echo "Uploaded all packages to ${PACKAGE_REGISTRY_URL}"

    - |
      ASSETS='[
        {
          "name": "kord-protocol-libs_'${VERSION}'_amd64.deb",
          "url": "'${PACKAGE_REGISTRY_URL}'/kord-protocol-libs_'${VERSION}'_amd64.deb"
        },
        {
          "name": "kord-protocol-libs-dev_'${VERSION}'_amd64.deb",
          "url": "'${PACKAGE_REGISTRY_URL}'/kord-protocol-libs-dev_'${VERSION}'_amd64.deb"
        },
        {
          "name": "kord-protocol-tests_'${VERSION}'_amd64.deb",
          "url": "'${PACKAGE_REGISTRY_URL}'/kord-protocol-tests_'${VERSION}'_amd64.deb"
        }
      ]'

    - |
      release-cli create \
        --tag-name ${CI_COMMIT_TAG} \
        --name "${CI_COMMIT_TAG}" \
        --description "${CI_COMMIT_TAG}" \
        --assets-link "${ASSETS}"