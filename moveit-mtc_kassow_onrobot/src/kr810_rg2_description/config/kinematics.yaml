# Kinematics solver configuration for KR810 + RG2

kr810_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3

# Note: rg2_gripper does not need a kinematics solver
# It's a simple gripper with mimic joints that only opens/closes
